# Full local stack (ARCHITECTURE.md §10.2, NFR-10, AC-52):
#   web + worker + postgres + redis, no paid API keys.
#   `docker compose up --build` → http://localhost:3000
#   migrations + seed run automatically via the web entrypoint.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shortener -d shortener']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
    command: ['web']
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://shortener:shortener@postgres:5432/shortener?schema=public
      REDIS_URL: redis://redis:6379/0
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-only-insecure-secret-change-me-please-32b}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      VISITOR_IP_PEPPER: ${VISITOR_IP_PEPPER:-dev-only-pepper-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      REDIRECT_STATUS: ${REDIRECT_STATUS:-302}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Bind-mount the bundled offline assets (GeoLite2 + blocklist) so they can
      # be provisioned without a rebuild (§10.3).
      - ./data:/app/data
    healthcheck:
      test:
        ['CMD-SHELL', 'node -e "fetch(''http://localhost:3000/api/healthz'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  worker:
    build:
      context: .
    command: ['worker']
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://shortener:shortener@postgres:5432/shortener?schema=public
      REDIS_URL: redis://redis:6379/0
      VISITOR_IP_PEPPER: ${VISITOR_IP_PEPPER:-dev-only-pepper-change-me}
      GEOIP_DB_PATH: data/GeoLite2-City.mmdb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
  redisdata:
